<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Vagas FG RH</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

/* CORES FG */

:root{
--gold:#F5A400;
--gold-light:#ffbf2f;
--black:#050505;
--dark:#0f0f0f;
--border:rgba(255,255,255,0.08);
--text:#ffffff;
--text-soft:#a8a8a8;
}

/* BODY */

body{
margin:0;
font-family:Segoe UI,system-ui;
background:radial-gradient(circle at top,#1a1a1a,#050505);
color:white;
padding:60px;
}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:40px;

}

.logo img{

width:140px;

object-fit:contain;

}

/* GRID VAGAS */

.vagas{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;

}

/* CARD VAGA */

.vaga{

background:linear-gradient(145deg,#0f0f0f,#080808);

border:1px solid var(--border);

padding:25px;

border-radius:14px;

transition:.3s;

position:relative;

overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

}

.vaga:hover{

transform:translateY(-6px) scale(1.02);

box-shadow:

0 20px 60px rgba(0,0,0,0.9),
0 0 25px rgba(245,164,0,.25);

border:1px solid rgba(245,164,0,.3);

}

/* GOLD LIGHT */

.vaga::before{

content:"";

position:absolute;

top:-50%;
left:-50%;

width:200%;
height:200%;

background:radial-gradient(circle,var(--gold),transparent 70%);

opacity:.04;

pointer-events:none;

}

/* TITULO */

.vaga h3{

margin:0 0 10px 0;

font-size:20px;

}

/* CIDADE */

.vaga p{

color:var(--text-soft);
margin-bottom:20px;

}

/* BOTÃO */

button{

background:linear-gradient(145deg,var(--gold),var(--gold-light));

color:black;

border:none;

padding:10px 16px;

border-radius:8px;

font-weight:600;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

box-shadow:

0 0 20px rgba(245,164,0,.6);

}

/* MODAL */

.modal{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.7);

backdrop-filter:blur(6px);

display:none;

align-items:center;
justify-content:center;

}

/* MODAL BOX */

.modal-content{

background:linear-gradient(145deg,#0f0f0f,#080808);

border:1px solid var(--border);

padding:25px;

width:360px;

border-radius:14px;

display:flex;
flex-direction:column;
gap:12px;

box-shadow:0 20px 60px rgba(0,0,0,.8);

}

/* INPUTS */

input{

background:#0f0f0f;

border:1px solid var(--border);

color:white;

padding:10px;

border-radius:8px;

}

/* TITULO */

h2{

margin:0 0 10px 0;

}

.upload{

display:flex;
align-items:center;
gap:12px;

background:#0f0f0f;
border:1px solid rgba(255,255,255,0.08);

padding:10px;

border-radius:10px;

}

.upload input{
display:none;
}

.upload-btn{

background:linear-gradient(145deg,#F5A400,#ffbf2f);

color:black;

padding:8px 14px;

border-radius:8px;

font-weight:600;

cursor:pointer;

transition:.2s;

}

.upload-btn:hover{

box-shadow:0 0 15px rgba(245,164,0,.6);

transform:translateY(-1px);

}

#file-name{

color:#aaa;
font-size:14px;

}

.descricao{

margin:15px 0;

font-size:14px;

line-height:1.5;

color:#aaa;

}

.salario{

color:#F5A400;

font-weight:600;

}

.cidade{

color:#bbb;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">
<img src="logo.png" alt="FG RH">
</div>

<h1>Vagas disponíveis</h1>

</div>


<div class="vagas" id="listaVagas"></div>


<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<h2>Candidatar</h2>

<input id="nome" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<input id="idade" placeholder="Idade">
<input id="whatsapp" placeholder="WhatsApp">
<input id="email" placeholder="Email">

<div class="upload">

<label for="curriculo" class="upload-btn">
📄 Escolher currículo
</label>

<span id="file-name">
Nenhum arquivo selecionado
</span>

<input type="file" id="curriculo" accept=".pdf">

</div>

<button onclick="enviar()">Enviar candidatura</button>

<button onclick="fechar()">Cancelar</button>

</div>

</div>


<script>

const SUPABASE_URL="https://ngitcbwpoencfoczuaoe.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5naXRjYndwb2VuY2ZvY3p1YW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjI3MDYsImV4cCI6MjA4ODkzODcwNn0.s6krkNEGUkG7JGZD_LY1tgz85qfTRrVxCSkO2Ly05-A"

const client=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let vagaSelecionada=null


async function carregar(){

const {data,error}=await client
.from("vagas")
.select("id,titulo,cidade,requisitos,atividades,salario,status")
.eq("status","publicada")

if(error){
console.error(error)
return
}

const lista=document.getElementById("listaVagas")

lista.innerHTML=""

data.forEach(v=>{

lista.innerHTML+=`

<div class="vaga">

<h3>${v.titulo}</h3>

<p class="cidade">📍 ${v.cidade}</p>

<p class="salario">💰 ${v.salario || "Salário a combinar"}</p>

<div class="descricao">

<strong>Requisitos:</strong>
<p>${v.requisitos || "Não informado"}</p>

<strong>Atividades:</strong>
<p>${v.atividades || "Não informado"}</p>

</div>

<button onclick="abrir(${v.id})">
Candidatar
</button>

</div>

`

})

}


function abrir(id){

vagaSelecionada=id

document.getElementById("modal").style.display="flex"

}


function fechar(){

document.getElementById("modal").style.display="none"

}


async function enviar(){

const nome=document.getElementById("nome").value
const cpf=document.getElementById("cpf").value
const idade=document.getElementById("idade").value
const whatsapp=document.getElementById("whatsapp").value
const email=document.getElementById("email").value

const file=document.getElementById("curriculo").files[0]

if(!file){
alert("Selecione o currículo PDF")
return
}

if(file.type!=="application/pdf"){
alert("Envie apenas PDF")
return
}

const fileName=`cv-${Date.now()}.pdf`

const {error:uploadError}=await client.storage
.from("curriculos")
.upload(fileName,file,{
contentType:"application/pdf"
})

if(uploadError){
alert(uploadError.message)
return
}

const { data:urlData }=client.storage
.from("curriculos")
.getPublicUrl(fileName)

await client
.from("candidatos")
.insert([{

vaga_id:vagaSelecionada,

nome,
cpf,
idade,
whatsapp,
email,

curriculo_url:urlData.publicUrl

}])

alert("Candidatura enviada com sucesso!")

fechar()

}

carregar()

</script>

</body>

</html>
